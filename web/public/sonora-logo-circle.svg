<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <clipPath id="circleClip">
      <circle cx="60" cy="58" r="54"/>
    </clipPath>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="clefGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark circle — transparent outside -->
  <circle cx="60" cy="58" r="54" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Everything clipped to circle -->
  <g clip-path="url(#circleClip)">

    <!--
      "Sonora" waveform — compact for circle
      Left bars outer→inner heights: 14, 32, 26, 46, 52, 56
      Right bars inner→outer heights: 56, 48, 34, 24, 16, 8
      Centered at y=52
    -->

    <!-- LEFT BARS -->
    <rect x="8"  y="45" width="5" height="14" rx="2.5" fill="#ff40ff" filter="url(#glow)" opacity="0.75"/>
    <rect x="16" y="36" width="5" height="32" rx="2.5" fill="#cc44e8" filter="url(#glow)" opacity="0.80"/>
    <rect x="24" y="39" width="5" height="26" rx="2.5" fill="#9060d4" filter="url(#glow)" opacity="0.85"/>
    <rect x="32" y="29" width="5" height="46" rx="2.5" fill="#5090e8" filter="url(#glow)" opacity="0.88"/>
    <rect x="40" y="26" width="5" height="52" rx="2.5" fill="#28b8f4" filter="url(#glow)" opacity="0.92"/>
    <rect x="48" y="24" width="5" height="56" rx="2.5" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>

    <!-- RIGHT BARS -->
    <rect x="67" y="24" width="5" height="56" rx="2.5" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>
    <rect x="75" y="28" width="5" height="48" rx="2.5" fill="#28b8f4" filter="url(#glow)" opacity="0.92"/>
    <rect x="83" y="35" width="5" height="34" rx="2.5" fill="#5090e8" filter="url(#glow)" opacity="0.88"/>
    <rect x="91" y="40" width="5" height="24" rx="2.5" fill="#9060d4" filter="url(#glow)" opacity="0.85"/>
    <rect x="99" y="44" width="5" height="16" rx="2.5" fill="#cc44e8" filter="url(#glow)" opacity="0.80"/>
    <rect x="107" y="48" width="5" height="8"  rx="2.5" fill="#ff40ff" filter="url(#glow)" opacity="0.75"/>

    <!-- TREBLE CLEF on top -->
    <text x="60" y="72" font-size="58" text-anchor="middle"
          fill="white" font-family="Georgia, 'Times New Roman', serif"
          filter="url(#clefGlow)">𝄞</text>

    <!-- SONORA text inside circle -->
    <text x="60" y="105" font-size="9" text-anchor="middle"
          fill="#cccccc" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          letter-spacing="5" font-weight="700">SONORA</text>

  </g>
</svg>
