<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4040ff"/>
      <stop offset="40%"  stop-color="#6060ee"/>
      <stop offset="60%"  stop-color="#6060ee"/>
      <stop offset="100%" stop-color="#4040ff"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="94"/>
    </clipPath>
  </defs>

  <!-- Circle background -->
  <circle cx="100" cy="100" r="94" fill="#050510"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#1a1a2e" stroke-width="2"/>

  <g clip-path="url(#circleClip)">
    <!--
      Dense equalizer bars — bell-curve heights centered on clef.
      Bar width=3, gap=1 (4px per bar).
      34 bars per side from center outward.
      Heights follow a bell curve peaking near the center.
      All bars vertically centered at y=92.
    -->

    <!-- LEFT SIDE bars, x from center (98) going left, inner→outer -->
    <!-- Each bar: x = 98 - (i * 4), height follows bell curve -->
    <!-- i=1  --> <rect x="94"  y="70" width="3" height="44" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=2  --> <rect x="90"  y="66" width="3" height="52" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=3  --> <rect x="86"  y="62" width="3" height="60" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=4  --> <rect x="82"  y="58" width="3" height="68" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=5  --> <rect x="78"  y="55" width="3" height="74" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=6  --> <rect x="74"  y="52" width="3" height="80" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=7  --> <rect x="70"  y="55" width="3" height="74" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=8  --> <rect x="66"  y="58" width="3" height="68" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=9  --> <rect x="62"  y="62" width="3" height="60" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=10 --> <rect x="58"  y="66" width="3" height="52" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=11 --> <rect x="54"  y="70" width="3" height="44" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=12 --> <rect x="50"  y="74" width="3" height="36" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=13 --> <rect x="46"  y="78" width="3" height="28" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=14 --> <rect x="42"  y="82" width="3" height="20" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=15 --> <rect x="38"  y="86" width="3" height="12" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=16 --> <rect x="34"  y="89" width="3" height="6"  rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>

    <!-- RIGHT SIDE bars, mirror of left -->
    <!-- i=1  --> <rect x="103" y="70" width="3" height="44" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=2  --> <rect x="107" y="66" width="3" height="52" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=3  --> <rect x="111" y="62" width="3" height="60" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=4  --> <rect x="115" y="58" width="3" height="68" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=5  --> <rect x="119" y="55" width="3" height="74" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=6  --> <rect x="123" y="52" width="3" height="80" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=7  --> <rect x="127" y="55" width="3" height="74" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=8  --> <rect x="131" y="58" width="3" height="68" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=9  --> <rect x="135" y="62" width="3" height="60" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=10 --> <rect x="139" y="66" width="3" height="52" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=11 --> <rect x="143" y="70" width="3" height="44" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=12 --> <rect x="147" y="74" width="3" height="36" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=13 --> <rect x="151" y="78" width="3" height="28" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=14 --> <rect x="155" y="82" width="3" height="20" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=15 --> <rect x="159" y="86" width="3" height="12" rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>
    <!-- i=16 --> <rect x="163" y="89" width="3" height="6"  rx="1.5" fill="url(#barGrad)" filter="url(#softGlow)"/>

    <!-- TREBLE CLEF on top of bars -->
    <text x="100" y="108" font-size="80" text-anchor="middle"
          fill="white" font-family="Georgia, 'Times New Roman', serif"
          filter="url(#softGlow)">𝄞</text>

    <!-- Sonora in italic serif like original -->
    <text x="100" y="150" font-size="16" text-anchor="middle"
          fill="white" font-family="Georgia, 'Times New Roman', serif"
          font-style="italic" font-weight="bold" letter-spacing="1">Sonora</text>
  </g>
</svg>
