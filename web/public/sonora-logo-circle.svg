<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="clefGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="100" cy="96" r="90"/>
    </clipPath>
  </defs>

  <!-- Transparent background â€” no fill -->
  <circle cx="100" cy="96" r="90" fill="none"/>

  <g clip-path="url(#circleClip)">

    <!--
      Same "Sonora" waveform as horizontal logo, scaled to fit circle.
      Bar heights (left outerâ†’inner): 17, 42, 32, 57, 67, 72
      Bar heights (right innerâ†’outer): 72, 61, 44, 30, 19, 10
      All bars centered at y=88.
      Bar width=6, gap=5 (11px per bar).
    -->

    <!-- LEFT BARS (outerâ†’inner, magentaâ†’cyan) -->
    <rect x="31" y="79" width="6" height="17" rx="3" fill="#ff40ff" filter="url(#glow)" opacity="0.75"/>
    <rect x="42" y="67" width="6" height="42" rx="3" fill="#cc44e8" filter="url(#glow)" opacity="0.80"/>
    <rect x="53" y="72" width="6" height="32" rx="3" fill="#9060d4" filter="url(#glow)" opacity="0.85"/>
    <rect x="64" y="59" width="6" height="57" rx="3" fill="#5090e8" filter="url(#glow)" opacity="0.88"/>
    <rect x="75" y="54" width="6" height="67" rx="3" fill="#28b8f4" filter="url(#glow)" opacity="0.92"/>
    <rect x="86" y="52" width="6" height="72" rx="3" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>

    <!-- RIGHT BARS (innerâ†’outer, cyanâ†’magenta) -->
    <rect x="108" y="52" width="6" height="72" rx="3" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>
    <rect x="119" y="57" width="6" height="61" rx="3" fill="#28b8f4" filter="url(#glow)" opacity="0.92"/>
    <rect x="130" y="66" width="6" height="44" rx="3" fill="#5090e8" filter="url(#glow)" opacity="0.88"/>
    <rect x="141" y="73" width="6" height="30" rx="3" fill="#9060d4" filter="url(#glow)" opacity="0.85"/>
    <rect x="152" y="78" width="6" height="19" rx="3" fill="#cc44e8" filter="url(#glow)" opacity="0.80"/>
    <rect x="163" y="83" width="6" height="10" rx="3" fill="#ff40ff" filter="url(#glow)" opacity="0.75"/>

    <!-- TREBLE CLEF on top of bars -->
    <text x="100" y="112" font-size="72" text-anchor="middle"
          fill="white" font-family="Georgia, 'Times New Roman', serif"
          filter="url(#clefGlow)">đť„ž</text>

    <!-- SONORA wordmark -->
    <text x="100" y="140" font-size="11" text-anchor="middle"
          fill="#dddddd" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          letter-spacing="7" font-weight="700">SONORA</text>
  </g>
</svg>
