<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 92" width="320" height="92">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="clefGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- No background = transparent -->

  <!--
    Bar heights mimic speaking "Sonora":
    S(soft)→o(rise)→n(mid)→[clef]→o(peak/stressed)→r(drop)→a(fade)
    Left bars outer→inner: 18, 44, 34, 60, 70, 76
    Right bars inner→outer: 76, 64, 46, 32, 20, 10
    All bars vertically centered at y=41
  -->

  <!-- LEFT BARS (outer→inner, magenta→cyan) -->
  <!-- bar 6 outermost: h=18, color=#ff40ff -->
  <rect x="68"  y="32" width="7" height="18" rx="3.5" fill="#ff40ff" filter="url(#glow)" opacity="0.75"/>
  <!-- bar 5: h=44 -->
  <rect x="81"  y="19" width="7" height="44" rx="3.5" fill="#cc44e8" filter="url(#glow)" opacity="0.80"/>
  <!-- bar 4: h=34 -->
  <rect x="94"  y="24" width="7" height="34" rx="3.5" fill="#9060d4" filter="url(#glow)" opacity="0.85"/>
  <!-- bar 3: h=60 -->
  <rect x="107" y="11" width="7" height="60" rx="3.5" fill="#5090e8" filter="url(#glow)" opacity="0.88"/>
  <!-- bar 2: h=70 -->
  <rect x="120" y="6"  width="7" height="70" rx="3.5" fill="#28b8f4" filter="url(#glow)" opacity="0.92"/>
  <!-- bar 1 innermost: h=76, overlaps clef -->
  <rect x="133" y="3"  width="7" height="76" rx="3.5" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>

  <!-- RIGHT BARS (inner→outer, cyan→magenta) -->
  <!-- bar 1 innermost: h=76 -->
  <rect x="180" y="3"  width="7" height="76" rx="3.5" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>
  <!-- bar 2: h=64 -->
  <rect x="193" y="9"  width="7" height="64" rx="3.5" fill="#28b8f4" filter="url(#glow)" opacity="0.92"/>
  <!-- bar 3: h=46 -->
  <rect x="206" y="18" width="7" height="46" rx="3.5" fill="#5090e8" filter="url(#glow)" opacity="0.88"/>
  <!-- bar 4: h=32 -->
  <rect x="219" y="25" width="7" height="32" rx="3.5" fill="#9060d4" filter="url(#glow)" opacity="0.85"/>
  <!-- bar 5: h=20 -->
  <rect x="232" y="31" width="7" height="20" rx="3.5" fill="#cc44e8" filter="url(#glow)" opacity="0.80"/>
  <!-- bar 6 outermost: h=10 -->
  <rect x="245" y="36" width="7" height="10" rx="3.5" fill="#ff40ff" filter="url(#glow)" opacity="0.75"/>

  <!-- TREBLE CLEF — drawn last so it sits on top of bars -->
  <text x="160" y="66" font-size="62" text-anchor="middle"
        fill="white" font-family="Georgia, 'Times New Roman', serif"
        filter="url(#clefGlow)">𝄞</text>

  <!-- SONORA wordmark -->
  <text x="160" y="87" font-size="10" text-anchor="middle"
        fill="#dddddd" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        letter-spacing="7" font-weight="700">SONORA</text>
</svg>
