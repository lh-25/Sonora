<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" rx="14" fill="url(#bgGrad)" stroke="#222" stroke-width="1"/>

  <!-- Left equalizer bars (inner → outer, each centered at y=44) -->
  <!-- Bar 1 innermost -->
  <rect x="118" y="25" width="6" height="38" rx="3" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>
  <!-- Bar 2 -->
  <rect x="108" y="17" width="6" height="54" rx="3" fill="#22c2f4" filter="url(#glow)" opacity="0.92"/>
  <!-- Bar 3 -->
  <rect x="98"  y="22" width="6" height="44" rx="3" fill="#50a8e8" filter="url(#glow)" opacity="0.88"/>
  <!-- Bar 4 -->
  <rect x="88"  y="13" width="6" height="62" rx="3" fill="#8878d4" filter="url(#glow)" opacity="0.85"/>
  <!-- Bar 5 -->
  <rect x="78"  y="27" width="6" height="34" rx="3" fill="#bf48e0" filter="url(#glow)" opacity="0.80"/>
  <!-- Bar 6 outermost -->
  <rect x="68"  y="34" width="6" height="20" rx="3" fill="#ff40ff" filter="url(#glow)" opacity="0.70"/>

  <!-- Right equalizer bars (mirror) -->
  <rect x="196" y="25" width="6" height="38" rx="3" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>
  <rect x="206" y="17" width="6" height="54" rx="3" fill="#22c2f4" filter="url(#glow)" opacity="0.92"/>
  <rect x="216" y="22" width="6" height="44" rx="3" fill="#50a8e8" filter="url(#glow)" opacity="0.88"/>
  <rect x="226" y="13" width="6" height="62" rx="3" fill="#8878d4" filter="url(#glow)" opacity="0.85"/>
  <rect x="236" y="27" width="6" height="34" rx="3" fill="#bf48e0" filter="url(#glow)" opacity="0.80"/>
  <rect x="246" y="34" width="6" height="20" rx="3" fill="#ff40ff" filter="url(#glow)" opacity="0.70"/>

  <!-- Treble clef centered -->
  <text x="160" y="66" font-size="58" text-anchor="middle"
        fill="white" font-family="Georgia, 'Times New Roman', serif"
        filter="url(#textGlow)">𝄞</text>

  <!-- SONORA wordmark -->
  <text x="160" y="90" font-size="11" text-anchor="middle"
        fill="#cccccc" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        letter-spacing="7" font-weight="700">SONORA</text>
</svg>
